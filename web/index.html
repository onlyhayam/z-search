<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Surf</title>
    <link rel="icon" type="image/svg+xml" href="z.svg" />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="30"
          height="30"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-globe-check-icon lucide-globe-check"
        >
          <path d="m15 6 2 2 4-4" class="uIjELvjg_0"></path>
          <path
            d="M2 12h20A10 10 0 1 1 12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 4-10"
            class="uIjELvjg_1"
          ></path>
          <style data-made-with="vivus-instant">
            .uIjELvjg_0 {
              stroke-dasharray: 9 11;
              stroke-dashoffset: 10;
              animation: uIjELvjg_draw 2000ms linear 0ms forwards;
            }
            .uIjELvjg_1 {
              stroke-dasharray: 101 103;
              stroke-dashoffset: 102;
              animation: uIjELvjg_draw 2000ms linear 1000ms forwards;
            }
            @keyframes uIjELvjg_draw {
              100% {
                stroke-dashoffset: 0;
              }
            }
            @keyframes uIjELvjg_fade {
              0% {
                stroke-opacity: 1;
              }
              94.44444444444444% {
                stroke-opacity: 1;
              }
              100% {
                stroke-opacity: 0;
              }
            }
          </style>
        </svg>
        <span class="brand__name">Surf</span>
      </div>

      <button
        id="menuToggle"
        class="icon-btn"
        aria-label="Open menu"
        aria-expanded="false"
      >
        <svg
          viewBox="0 0 24 24"
          width="22"
          height="22"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </header>

    <!-- Backdrop for the side menu; clicking it closes the menu. -->
    <div id="sideMenuOverlay" class="side-menu__overlay"></div>

    <!-- Slide-in drawer (right to left), currently just holds the default-engine
       hint, but built so more settings/links can be added later. It's
       position:fixed so it never affects the page layout. -->
    <nav id="sideMenu" class="side-menu">
      <div class="side-menu__section">
        <h1>Surf</h1>
        <ul>
          <li>
            <a href="/index.html">Surf</a>
          </li>
          <li>
            <a href="#.html">Surf Control</a>
          </li>
        </ul>

        <h1>Feed</h1>
        <ul>
          <li>
            <a href="feed/index.html">Feed</a>
          </li>
          <li>
            <a href="feed/control.html">Feed Control</a>
          </li>
        </ul>
      </div>
    </nav>

    <main class="main">
      <div class="bg">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="400"
          height="400"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-globe-check-icon lucide-globe-check"
        >
          <path d="m15 6 2 2 4-4" class="uIjELvjg_0"></path>
          <path
            d="M2 12h20A10 10 0 1 1 12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 4-10"
            class="uIjELvjg_1"
          ></path>
          <style data-made-with="vivus-instant">
            .uIjELvjg_0 {
              stroke-dasharray: 9 11;
              stroke-dashoffset: 10;
              animation: uIjELvjg_draw 2000ms linear 0ms forwards;
            }
            .uIjELvjg_1 {
              stroke-dasharray: 101 103;
              stroke-dashoffset: 102;
              animation: uIjELvjg_draw 2000ms linear 1000ms forwards;
            }
            @keyframes uIjELvjg_draw {
              100% {
                stroke-dashoffset: 0;
              }
            }
            @keyframes uIjELvjg_fade {
              0% {
                stroke-opacity: 1;
              }
              94.44444444444444% {
                stroke-opacity: 1;
              }
              100% {
                stroke-opacity: 0;
              }
            }
          </style>
        </svg>
      </div>
      <section class="default-engine">
        <span>Default:</span>
        <button
          id="defaultEngineBtn"
          class="default-engine__btn"
          aria-haspopup="listbox"
          aria-expanded="false"
        >
          <span id="defaultEngineLabel">DuckDuckGo</span>
          <svg
            viewBox="0 0 24 24"
            width="16"
            height="16"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>

        <!-- Populated dynamically from ENGINES in engines.js -->
        <ul
          id="defaultEngineMenu"
          class="dropdown-menu"
          role="listbox"
          hidden
        ></ul>
      </section>

      <section class="search-box">
        <form id="searchForm" autocomplete="off">
          <input
            type="text"
            id="searchInput"
            class="search-box__input"
            placeholder="Type your search…"
            aria-label="Search query"
          />
          <button type="submit" class="search-box__submit" aria-label="Search">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="30"
              height="30"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-globe-check-icon lucide-globe-check"
            >
              <path d="m15 6 2 2 4-4" class="uIjELvjg_0"></path>
              <path
                d="M2 12h20A10 10 0 1 1 12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 4-10"
                class="uIjELvjg_1"
              ></path>
              <style data-made-with="vivus-instant">
                .uIjELvjg_0 {
                  stroke-dasharray: 9 11;
                  stroke-dashoffset: 10;
                  animation: uIjELvjg_draw 2000ms linear 0ms forwards;
                }
                .uIjELvjg_1 {
                  stroke-dasharray: 101 103;
                  stroke-dashoffset: 102;
                  animation: uIjELvjg_draw 2000ms linear 1000ms forwards;
                }
                @keyframes uIjELvjg_draw {
                  100% {
                    stroke-dashoffset: 0;
                  }
                }
                @keyframes uIjELvjg_fade {
                  0% {
                    stroke-opacity: 1;
                  }
                  94.44444444444444% {
                    stroke-opacity: 1;
                  }
                  100% {
                    stroke-opacity: 0;
                  }
                }
              </style>
            </svg>
          </button>
        </form>
      </section>

      <section class="engine-list" aria-label="Search with a specific engine">
        <!-- Populated dynamically from ENGINES in engines.js -->
      </section>

      <div class="ad-box" id="adBox">
        <div class="slideshow" id="slideshow">
          <div class="slides" id="slides"></div>
          <button class="nav-btn nav-prev" onclick="prevSlide()">
            &#10094;
          </button>
          <button class="nav-btn nav-next" onclick="nextSlide()">
            &#10095;
          </button>
          <div class="dots" id="dots"></div>
        </div>
        <div class="ad-buttons">
          <a class="btn1" id="btn1" href="#" target="_blank"></a>
          <a class="btn2" id="btn2" href="#" target="_blank"></a>
        </div>
      </div>
      <iframe src="/feed/feed.html"></iframe>
    </main>
    <footer>
      <svg
        width="100%"
        height="200mm"
        viewBox="0 0 100 100"
        version="1.1"
        id="svg1"
        inkscape:version="1.4.4 (dcaf3e7d9e, 2026-05-05)"
        sodipodi:docname="drawing.svg"
        xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
        xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
        xmlns="http://www.w3.org/2000/svg"
        xmlns:svg="http://www.w3.org/2000/svg"
      >
        <sodipodi:namedview
          id="namedview1"
          pagecolor="#ffffff"
          bordercolor="#000000"
          borderopacity="0.25"
          inkscape:showpageshadow="2"
          inkscape:pageopacity="0.0"
          inkscape:pagecheckerboard="0"
          inkscape:deskcolor="#d1d1d1"
          inkscape:document-units="mm"
          inkscape:zoom="0.58710691"
          inkscape:cx="798.83236"
          inkscape:cy="348.31816"
          inkscape:window-width="1920"
          inkscape:window-height="1172"
          inkscape:window-x="0"
          inkscape:window-y="0"
          inkscape:window-maximized="1"
          inkscape:current-layer="layer1"
        />
        <defs id="defs1" />
        <g inkscape:label="Layer 1" inkscape:groupmode="layer" id="layer1">
          <ellipse
            style="fill: #000000; stroke-width: 0.404623"
            id="path1"
            cx="95.989746"
            cy="142.63268"
            rx="261.38055"
            ry="75.935562"
          />
        </g>
      </svg>
    </footer>
    <script src="engines.js"></script>
    <script src="script.js"></script>
    <script src="affiliation.js"></script>
    <script src="feeds.js"></script>
  </body>
</html>
