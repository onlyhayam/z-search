<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Feeds</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="nav-link" href="/index.html">Back to Surf</a>
    </header>

    <div class="container">
      <div class="pwrap">
        <div class="panel">
          <h1>Feed Preferences</h1>
          <h2>Add category</h2>
          <div class="form-row">
            <input
              type="text"
              id="newCategoryName"
              placeholder="Category name (e.g. Science)"
            />
            <button id="addCategoryBtn">Add category</button>
          </div>
        </div>
        <div class="panel">
          <h2>Add feed</h2>
          <div class="form-row">
            <select id="feedCategorySelect"></select>
            <input type="text" id="newFeedName" placeholder="Feed name" />
            <input
              type="url"
              id="newFeedUrl"
              placeholder="https://example.com/rss.xml"
            />
            <button id="addFeedBtn">Add feed</button>
          </div>
        </div>

        <div id="categoriesList"></div>

        <div class="panel">
          <h2>Reset</h2>
          <div class="form-row">
            <button class="btn-ghost" id="resetBtn">
              Restore defaults &amp; clear custom feeds
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="feeds.js"></script>
    <script src="control.js"></script>
  </body>
</html>
